<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Player Wordle - Elite Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --cs-orange: #ff9800;
            --cs-dark: #0b0e11;
            --cs-card: #16191c;
            --tile-border: #333;
            --correct: #4caf50;
            --present: #ff9800;
            --absent: #3a3a3c;
            --error: #ff4b4b;
            --header-height: 60px;
        }

        body {
            font-family: 'Segoe UI', Impact, sans-serif;
            background-color: var(--cs-dark);
            background-image: radial-gradient(circle at center, #1a1d20 0%, #0b0e11 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-top: calc(var(--header-height) + 10px);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CABECERA COMPACTA */
        .header {
            position: fixed;
            top: 0; width: 100%; height: var(--header-height);
            background: rgba(22, 25, 28, 0.95);
            border-bottom: 2px solid var(--cs-orange);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .header h1 { font-size: 1.5rem; letter-spacing: 5px; color: var(--cs-orange); margin: 0; }

        .menu-btn {
            position: absolute; left: 15px;
            background: transparent; color: #888; border: 1px solid #444;
            padding: 5px 10px; cursor: pointer; border-radius: 4px;
            font-size: 10px; text-decoration: none; text-transform: uppercase;
        }

        #message {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--cs-orange);
            height: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* CUADRÍCULA WORDLE */
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 120px; /* Espacio para el input flotante */
        }

        .row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }

        .tile {
            width: 50px;
            height: 50px;
            border: 2px solid var(--tile-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            background-color: var(--cs-dark);
            transition: all 0.3s ease;
        }

        @media (max-width: 400px) {
            .tile { width: 40px; height: 40px; font-size: 1.5rem; }
        }

        .tile.pop { border-color: #777; transform: scale(1.05); }
        .tile.correct { background-color: var(--correct); border-color: var(--correct); color: white; }
        .tile.present { background-color: var(--present); border-color: var(--present); color: white; }
        .tile.absent { background-color: var(--absent); border-color: var(--absent); color: #888; }

        /* INPUT FLOTANTE */
        .input-area {
            position: fixed;
            bottom: 25px;
            width: 90%;
            max-width: 400px;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        #guess-input {
            pointer-events: auto;
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #444;
            background: #16191c;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: border-color 0.3s, transform 0.2s;
        }

        #guess-input:focus { border-color: var(--cs-orange); transform: translateY(-2px); }

        .shake { animation: shake 0.3s ease-in-out; border-color: var(--error) !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #reset-btn {
            pointer-events: auto;
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--cs-orange);
            color: black;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            display: none;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="menu-btn">←</a>
        <h1>CS WORDLE</h1>
    </div>

    <div id="message"></div>
    <div id="game-container"></div>

    <div class="input-area">
        <input type="text" id="guess-input" placeholder="ESCRIBE AQUÍ..." autocomplete="off">
        <button id="reset-btn" onclick="initGame()">Jugar de Nuevo</button>
    </div>

<script>
    // BASE DE DATOS DE JUGADORES (Agrega más si lo deseas)
    const words = {
        2: ["IM", "JT"],
        3: ["B1T", "JDC", "DGT", "DEX", "ART"],
        4: ["NIKO", "DONK", "ROPZ", "APEX", "MAKA", "SNOW"],
        5: ["ZYWOO", "SHIRO", "FLAME", "MEZZI", "TORZI", "SPINX", "BROKY", "TABSE"],
        6: ["M0NESY", "KYXSAN", "WONDER", "HEAVYG", "SUNPAY", "FROZEN", "MALBSM"],
        7: ["JIMPHAT", "XERTION", "ZONT1X", "MAGIXX", "ALEKSIB", "WONDERF"]
    };

    let targetWord = "";
    let currentWordLength = 5;
    let maxAttempts = 6;
    let currentAttempt = 0;
    let currentGuess = "";
    let gameOver = false;

    const gameContainer = document.getElementById('game-container');
    const guessInput = document.getElementById('guess-input');
    const messageDisplay = document.getElementById('message');
    const resetBtn = document.getElementById('reset-btn');

    function initGame() {
        // Elegir una longitud al azar entre las disponibles
        const lengths = Object.keys(words);
        currentWordLength = parseInt(lengths[Math.floor(Math.random() * lengths.length)]);
        
        // Elegir una palabra al azar de esa longitud
        const wordList = words[currentWordLength];
        targetWord = wordList[Math.floor(Math.random() * wordList.length)];
        
        currentAttempt = 0;
        currentGuess = "";
        gameOver = false;
        messageDisplay.innerText = `Adivina el jugador (${currentWordLength} letras)`;
        
        // Preparar el Input
        guessInput.disabled = false;
        guessInput.value = "";
        guessInput.maxLength = currentWordLength;
        guessInput.placeholder = "ESCRIBE AQUÍ...";
        resetBtn.style.display = 'none';

        // Crear la cuadrícula
        gameContainer.innerHTML = '';
        for (let i = 0; i < maxAttempts; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < currentWordLength; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                row.appendChild(tile);
            }
            gameContainer.appendChild(row);
        }
        
        guessInput.focus();
    }

    // SINCRONIZAR EL INPUT CON LOS CUADRITOS EN TIEMPO REAL
    guessInput.addEventListener('input', function(e) {
        if (gameOver) return;
        
        // Forzar mayúsculas y quitar espacios/símbolos raros
        let val = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        this.value = val;
        currentGuess = val;

        // Actualizar la fila actual
        const row = document.getElementsByClassName('row')[currentAttempt];
        const tiles = row.getElementsByClassName('tile');
        
        for (let i = 0; i < currentWordLength; i++) {
            tiles[i].innerText = currentGuess[i] || "";
            if (currentGuess[i]) {
                tiles[i].classList.add('pop');
            } else {
                tiles[i].classList.remove('pop');
            }
        }
    });

    // PRESIONAR ENTER PARA ENVIAR
    guessInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (currentGuess.length === currentWordLength) {
                checkGuess();
            } else {
                // Efecto de error si no completó la palabra
                this.classList.add('shake');
                setTimeout(() => this.classList.remove('shake'), 300);
            }
        }
    });

    function checkGuess() {
        if (gameOver) return;

        const row = document.getElementsByClassName('row')[currentAttempt];
        const tiles = row.getElementsByClassName('tile');
        
        let targetArr = targetWord.split('');
        let guessArr = currentGuess.split('');

        // Paso 1: Marcar los CORRECTOS (Verdes)
        for (let i = 0; i < currentWordLength; i++) {
            if (guessArr[i] === targetArr[i]) {
                tiles[i].classList.add('correct');
                targetArr[i] = null; // Marcar como usado
                guessArr[i] = null;
            }
        }

        // Paso 2: Marcar los PRESENTES (Naranjas) y AUSENTES (Grises)
        for (let i = 0; i < currentWordLength; i++) {
            if (guessArr[i]) {
                const indexInTarget = targetArr.indexOf(guessArr[i]);
                if (indexInTarget !== -1) {
                    tiles[i].classList.add('present');
                    targetArr[indexInTarget] = null; // Marcar como usado
                } else {
                    tiles[i].classList.add('absent');
                }
            }
        }

        // Comprobar victoria o derrota
        if (currentGuess === targetWord) {
            messageDisplay.innerText = "¡NICE SHOT! 🎉 GANASTE";
            finishGame(true);
        } else {
            currentAttempt++;
            if (currentAttempt === maxAttempts) {
                messageDisplay.innerText = `EL JUGADOR ERA: ${targetWord}`;
                finishGame(false);
            } else {
                // Limpiar para el siguiente intento
                currentGuess = "";
                guessInput.value = "";
            }
        }
    }

    function finishGame(won) {
        gameOver = true;
        guessInput.disabled = true;
        guessInput.placeholder = "JUEGO TERMINADO";
        resetBtn.style.display = 'block';
        if (won) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    // Iniciar al cargar
    window.onload = initGame;
</script>
</body>
</html>
